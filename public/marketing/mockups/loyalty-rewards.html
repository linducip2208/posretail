<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700|jetbrains-mono:400,700" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; background: #f8fafc; }
    .sidebar { background: linear-gradient(180deg, #1e1b4b 0%, #111827 100%); }
    .card { background: white; border-radius: 14px; border: 1px solid #e5e7eb; }
    .badge { border-radius: 6px; font-weight: 600; font-size: 11px; padding: 2px 8px; }
    .btn-primary { background: linear-gradient(135deg, #4f46e5, #4338ca); color: white; border-radius: 8px; font-weight: 600; }
  </style>
</head>
<body class="flex h-screen">
  <div class="sidebar w-64 text-white p-4 flex flex-col gap-1">
    <div class="text-sm font-bold px-3 py-2">POS Retail</div>
    <div class="text-[10px] uppercase tracking-widest text-gray-500 px-3 pt-4 pb-1">Loyalitas</div>
    <div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-white/10 text-sm font-medium">
      <span>🎁</span> Loyalty Reward
    </div>
    <div class="text-[10px] uppercase tracking-widest text-gray-500 px-3 pt-4 pb-1">Lainnya</div>
  </div>
  <div class="flex-1 flex flex-col">
    <div class="bg-white/80 backdrop-blur border-b px-6 py-3 flex items-center justify-between">
      <h1 class="text-lg font-bold text-gray-900">Loyalty Reward</h1>
      <button class="btn-primary px-4 py-2 text-sm">+ Tambah</button>
    </div>
    <div class="flex-1 p-6">
      <div class="card overflow-hidden">
        <table class="w-full">
          <thead>
            <tr class="bg-gray-50 text-left text-[11px] uppercase tracking-wider text-gray-500 font-bold">
              <th class="px-4 py-3">Hadiah</th><th class="px-4 py-3">Jenis Diskon</th><th class="px-4 py-3">Poin</th><th class="px-4 py-3">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr class="bg-white border-t border-gray-100 text-sm">
              <td class="px-4 py-2.5 font-semibold text-gray-800">Diskon 10% Next Purchase</td><td class="px-4 py-2.5 "><span class="badge bg-blue-100 text-blue-700">Percent</span></td><td class="px-4 py-2.5 ">500</td><td class="px-4 py-2.5 "><span class="badge bg-green-100 text-green-700">Aktif</span></td>
            </tr><tr class="bg-gray-50/50 border-t border-gray-100 text-sm">
              <td class="px-4 py-2.5 font-semibold text-gray-800">Gratis 1 Produk</td><td class="px-4 py-2.5 "><span class="badge bg-orange-100 text-orange-700">Fixed</span></td><td class="px-4 py-2.5 ">1.000</td><td class="px-4 py-2.5 "><span class="badge bg-green-100 text-green-700">Aktif</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
