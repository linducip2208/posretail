<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700|jetbrains-mono:400,700" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; background: #f8fafc; }
    .sidebar { background: linear-gradient(180deg, #1e1b4b 0%, #111827 100%); }
    .card { background: white; border-radius: 14px; border: 1px solid #e5e7eb; }
    .badge { border-radius: 6px; font-weight: 600; font-size: 11px; padding: 2px 8px; }
    .btn-primary { background: linear-gradient(135deg, #4f46e5, #4338ca); color: white; border-radius: 8px; font-weight: 600; }
  </style>
</head>
<body class="flex h-screen">
  <div class="sidebar w-64 text-white p-4 flex flex-col gap-1">
    <div class="text-sm font-bold px-3 py-2">POS Retail</div>
    <div class="text-[10px] uppercase tracking-widest text-gray-500 px-3 pt-4 pb-1">Inventori</div>
    <div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-white/10 text-sm font-medium">
      <span>🧂</span> Bahan Baku
    </div>
    <div class="text-[10px] uppercase tracking-widest text-gray-500 px-3 pt-4 pb-1">Lainnya</div>
  </div>
  <div class="flex-1 flex flex-col">
    <div class="bg-white/80 backdrop-blur border-b px-6 py-3 flex items-center justify-between">
      <h1 class="text-lg font-bold text-gray-900">Bahan Baku</h1>
      <button class="btn-primary px-4 py-2 text-sm">+ Tambah</button>
    </div>
    <div class="flex-1 p-6">
      <div class="card overflow-hidden">
        <table class="w-full">
          <thead>
            <tr class="bg-gray-50 text-left text-[11px] uppercase tracking-wider text-gray-500 font-bold">
              <th class="px-4 py-3">Nama</th><th class="px-4 py-3">Kode</th><th class="px-4 py-3">Unit</th><th class="px-4 py-3">Harga/Unit</th><th class="px-4 py-3">Stok</th>
            </tr>
          </thead>
          <tbody>
            <tr class="bg-white border-t border-gray-100 text-sm">
              <td class="px-4 py-2.5 font-semibold text-gray-800">Tepung Terigu</td><td class="px-4 py-2.5 ">RM001</td><td class="px-4 py-2.5 ">Kg</td><td class="px-4 py-2.5 ">Rp 12.000</td><td class="px-4 py-2.5 ">50</td>
            </tr><tr class="bg-gray-50/50 border-t border-gray-100 text-sm">
              <td class="px-4 py-2.5 font-semibold text-gray-800">Gula Pasir</td><td class="px-4 py-2.5 ">RM002</td><td class="px-4 py-2.5 ">Kg</td><td class="px-4 py-2.5 ">Rp 15.000</td><td class="px-4 py-2.5 ">30</td>
            </tr><tr class="bg-white border-t border-gray-100 text-sm">
              <td class="px-4 py-2.5 font-semibold text-gray-800">Minyak Goreng</td><td class="px-4 py-2.5 ">RM003</td><td class="px-4 py-2.5 ">Liter</td><td class="px-4 py-2.5 ">Rp 20.000</td><td class="px-4 py-2.5 ">20</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
